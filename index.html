<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#087c46">
  <title>公交线路图制作器</title>
  <style>
    :root {
      color-scheme: light;
      --brand: #087c46;
      --brand-2: #00a45a;
      --ink: #17211c;
      --muted: #65736b;
      --line: #dce5df;
      --paper: #ffffff;
      --canvas: #edf3ef;
      --shadow: 0 12px 36px rgba(18, 53, 35, .10);
      --radius: 18px;
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      min-height: 100%;
      background: #f3f7f4;
    }

    body {
      margin: 0;
      min-width: 320px;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% -10%, rgba(0, 164, 90, .12), transparent 30rem),
        linear-gradient(180deg, #f7faf8 0%, #eef4f0 100%);
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button,
    select,
    input[type="color"],
    input[type="checkbox"] {
      cursor: pointer;
    }

    button {
      border: 0;
    }

    .app {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 0 18px 96px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 72px;
      margin: 0 -18px 22px;
      padding: 12px max(18px, env(safe-area-inset-right)) 12px max(18px, env(safe-area-inset-left));
      color: #fff;
      background: linear-gradient(120deg, #086f42, #00a159);
      box-shadow: 0 8px 24px rgba(0, 91, 49, .18);
    }

    .brand {
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(19px, 4.8vw, 25px);
      line-height: 1.15;
      letter-spacing: .02em;
    }

    .brand p {
      margin: 5px 0 0;
      overflow: hidden;
      color: rgba(255, 255, 255, .78);
      font-size: 12px;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .header-actions {
      display: flex;
      flex: none;
      gap: 9px;
    }

    .workspace {
      display: grid;
      gap: 20px;
    }

    .card {
      border: 1px solid rgba(14, 85, 48, .08);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .96);
      box-shadow: var(--shadow);
    }

    .preview-card {
      overflow: hidden;
    }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 15px 16px;
      border-bottom: 1px solid var(--line);
    }

    .card-title {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
      margin: 0;
      font-size: 16px;
      font-weight: 720;
    }

    .live-dot {
      width: 9px;
      height: 9px;
      flex: none;
      border-radius: 50%;
      background: #14b86a;
      box-shadow: 0 0 0 5px rgba(20, 184, 106, .13);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 42px;
      padding: 9px 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      color: #284035;
      background: #fff;
      font-weight: 650;
      line-height: 1;
      text-decoration: none;
      transition: transform .15s ease, border-color .15s ease, background .15s ease;
    }

    .btn:active {
      transform: scale(.97);
    }

    .btn:hover {
      border-color: #a9c8b6;
      background: #f8fbf9;
    }

    .btn-primary {
      border-color: transparent;
      color: #fff;
      background: linear-gradient(120deg, #087c46, #00a75d);
      box-shadow: 0 7px 18px rgba(0, 132, 72, .20);
    }

    .btn-primary:hover {
      border-color: transparent;
      background: linear-gradient(120deg, #076f3f, #009653);
    }

    .btn-danger {
      color: #a22d3f;
      border-color: #f0ccd2;
      background: #fffafb;
    }

    .btn-compact {
      min-height: 36px;
      padding: 7px 11px;
      border-radius: 10px;
      font-size: 13px;
    }

    .preview-stage {
      padding: 14px;
      background:
        linear-gradient(45deg, rgba(23, 50, 35, .035) 25%, transparent 25%) 0 0 / 18px 18px,
        linear-gradient(-45deg, rgba(23, 50, 35, .035) 25%, transparent 25%) 0 9px / 18px 18px,
        linear-gradient(45deg, transparent 75%, rgba(23, 50, 35, .035) 75%) 9px -9px / 18px 18px,
        linear-gradient(-45deg, transparent 75%, rgba(23, 50, 35, .035) 75%) -9px 0 / 18px 18px,
        #eef3f0;
    }

    .preview-scroll {
      width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 5px 18px rgba(20, 42, 31, .12);
      overscroll-behavior-inline: contain;
      scrollbar-width: thin;
    }

    #previewMount {
      width: 100%;
      min-width: 0;
      transition: width .2s ease;
    }

    .preview-scroll.zoomed #previewMount {
      width: 1220px;
    }

    #previewMount svg,
    #fullPreview svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .preview-tip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 11px 16px 14px;
      color: var(--muted);
      font-size: 12px;
    }

    .save-state {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex: none;
      color: #39805b;
    }

    .save-state::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #44b978;
    }

    .editor {
      display: grid;
      gap: 15px;
    }

    details.form-card {
      overflow: hidden;
    }

    details.form-card > summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 58px;
      padding: 14px 16px;
      list-style: none;
      font-size: 16px;
      font-weight: 740;
      cursor: pointer;
      user-select: none;
    }

    details.form-card > summary::-webkit-details-marker {
      display: none;
    }

    details.form-card > summary::after {
      content: "+";
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      flex: none;
      border-radius: 50%;
      color: #557067;
      background: #edf4ef;
      font-size: 20px;
      font-weight: 400;
      transition: transform .18s ease;
    }

    details.form-card[open] > summary::after {
      transform: rotate(45deg);
    }

    .summary-meta {
      margin-left: auto;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
    }

    .form-body {
      padding: 4px 16px 18px;
      border-top: 1px solid var(--line);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px 12px;
      padding-top: 15px;
    }

    .field {
      display: grid;
      align-content: start;
      gap: 7px;
      min-width: 0;
    }

    .field-full {
      grid-column: 1 / -1;
    }

    .field label,
    .field-label {
      color: #405148;
      font-size: 13px;
      font-weight: 650;
    }

    .control,
    textarea {
      width: 100%;
      min-height: 44px;
      border: 1px solid #d5e0d9;
      border-radius: 11px;
      outline: none;
      color: var(--ink);
      background: #fbfdfc;
      transition: border-color .15s ease, box-shadow .15s ease, background .15s ease;
    }

    input.control,
    select.control {
      padding: 9px 11px;
    }

    textarea {
      min-height: 310px;
      padding: 12px;
      resize: vertical;
      font-family: "SFMono-Regular", Consolas, "Microsoft YaHei", monospace;
      font-size: 14px;
      line-height: 1.7;
    }

    .control:focus,
    textarea:focus {
      border-color: #42a773;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(31, 151, 91, .11);
    }

    .helper {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .station-help {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 27px;
      padding: 4px 8px;
      border-radius: 999px;
      color: #526158;
      background: #eef3f0;
      font-size: 12px;
    }

    .tag-blue {
      color: #067b9f;
      background: #e4f6fb;
    }

    .tag-red {
      color: #b22842;
      background: #fdebef;
    }

    .row-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .color-control {
      display: grid;
      grid-template-columns: 46px 1fr;
      align-items: center;
      gap: 9px;
    }

    .color-control input[type="color"] {
      width: 46px;
      height: 44px;
      padding: 3px;
      border: 1px solid #d5e0d9;
      border-radius: 11px;
      background: #fff;
    }

    .check-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .check {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 44px;
      padding: 9px 11px;
      border: 1px solid #dce5df;
      border-radius: 11px;
      color: #3c4d44;
      background: #fbfdfc;
      font-size: 13px;
      font-weight: 600;
    }

    .check input {
      width: 19px;
      height: 19px;
      accent-color: #08854a;
    }

    .range-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #07874a;
    }

    .range-value {
      min-width: 46px;
      color: #4b6155;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    .mobile-actions {
      position: fixed;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 40;
      display: grid;
      grid-template-columns: 1fr 1.55fr;
      gap: 10px;
      padding: 10px max(14px, env(safe-area-inset-right)) calc(10px + env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
      border-top: 1px solid rgba(0, 72, 39, .10);
      background: rgba(255, 255, 255, .94);
      box-shadow: 0 -10px 28px rgba(20, 47, 32, .12);
      backdrop-filter: blur(14px);
    }

    dialog {
      width: min(1160px, calc(100% - 24px));
      max-height: calc(100dvh - 24px);
      padding: 0;
      overflow: hidden;
      border: 0;
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 24px 70px rgba(0, 0, 0, .28);
    }

    dialog::backdrop {
      background: rgba(6, 23, 14, .72);
      backdrop-filter: blur(3px);
    }

    .dialog-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .dialog-head h2 {
      margin: 0;
      font-size: 17px;
    }

    .dialog-body {
      max-height: calc(100dvh - 168px);
      padding: 14px;
      overflow: auto;
      background: #eef3f0;
    }

    .full-preview-inner {
      width: 1220px;
      max-width: none;
      overflow: hidden;
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 7px 24px rgba(18, 42, 29, .16);
    }

    .export-result {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 9px;
      background: #fff;
      box-shadow: 0 5px 20px rgba(19, 47, 31, .14);
    }

    .export-status {
      margin: 0 0 12px;
      color: #52645a;
      font-size: 13px;
      line-height: 1.5;
    }

    .dialog-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 9px;
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--line);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(78px + env(safe-area-inset-bottom));
      z-index: 90;
      max-width: calc(100% - 32px);
      padding: 11px 16px;
      border-radius: 999px;
      color: #fff;
      background: rgba(19, 35, 27, .94);
      box-shadow: 0 10px 28px rgba(0, 0, 0, .23);
      font-size: 13px;
      opacity: 0;
      transform: translate(-50%, 10px);
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (min-width: 900px) {
      .app {
        padding-right: 24px;
        padding-left: 24px;
      }

      .topbar {
        margin-right: -24px;
        margin-left: -24px;
        padding-right: 24px;
        padding-left: 24px;
      }

      .workspace {
        grid-template-columns: minmax(0, 1fr) 430px;
        align-items: start;
      }

      .preview-card {
        position: sticky;
        top: 94px;
      }

      .mobile-actions {
        display: none;
      }

      .app {
        padding-bottom: 40px;
      }
    }

    @media (max-width: 620px) {
      .app {
        padding-right: 12px;
        padding-left: 12px;
      }

      .topbar {
        min-height: 66px;
        margin-right: -12px;
        margin-bottom: 14px;
        margin-left: -12px;
      }

      .brand p {
        display: none;
      }

      .header-actions .btn:not(.btn-primary) {
        display: none;
      }

      .header-actions .btn {
        min-height: 40px;
        padding-right: 12px;
        padding-left: 12px;
      }

      .card-head {
        align-items: flex-start;
        padding: 13px;
      }

      .toolbar {
        gap: 6px;
      }

      .toolbar .btn {
        min-height: 36px;
        padding: 7px 10px;
        font-size: 12px;
      }

      .preview-stage {
        padding: 9px;
      }

      .preview-tip {
        padding: 9px 12px 12px;
      }

      .preview-tip > span:first-child {
        max-width: 68%;
      }

      .grid,
      .check-grid {
        grid-template-columns: 1fr;
      }

      .field-full {
        grid-column: auto;
      }

      .summary-meta {
        display: none;
      }

      textarea {
        min-height: 360px;
      }

      dialog {
        width: calc(100% - 16px);
        max-height: calc(100dvh - 16px);
        border-radius: 14px;
      }

      .dialog-body {
        max-height: calc(100dvh - 158px);
        padding: 10px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <h1>公交线路图制作器</h1>
        <p>单文件 · 离线可用 · 手机适配 · 高清图片导出</p>
      </div>
      <div class="header-actions">
        <button class="btn" id="restoreSampleTop" type="button">恢复示例</button>
        <button class="btn btn-primary export-trigger" type="button">导出 PNG</button>
      </div>
    </header>

    <main class="workspace">
      <section class="card preview-card" aria-labelledby="previewTitle">
        <div class="card-head">
          <h2 class="card-title" id="previewTitle"><span class="live-dot"></span>实时预览</h2>
          <div class="toolbar">
            <button class="btn btn-compact" id="zoomToggle" type="button">放大查看</button>
            <button class="btn btn-compact" id="openFullPreview" type="button">全屏预览</button>
          </div>
        </div>
        <div class="preview-stage">
          <div class="preview-scroll" id="previewScroll">
            <div id="previewMount"></div>
          </div>
        </div>
        <div class="preview-tip">
          <span>放大后可左右滑动查看全部站名</span>
          <span class="save-state" id="saveState">已自动保存</span>
        </div>
      </section>

      <section class="editor" aria-label="线路图设置">
        <details class="card form-card" open>
          <summary>
            <span>基础信息</span>
            <span class="summary-meta">所有文字均可修改</span>
          </summary>
          <div class="form-body">
            <div class="grid">
              <div class="field field-full">
                <label for="routeName">线路名称</label>
                <input class="control" id="routeName" data-field="routeName" maxlength="16" autocomplete="off">
              </div>
              <div class="field">
                <label for="operator">运营单位</label>
                <input class="control" id="operator" data-field="operator" maxlength="20" autocomplete="off">
              </div>
              <div class="field">
                <label for="timeTitle">时间栏标题</label>
                <input class="control" id="timeTitle" data-field="timeTitle" maxlength="20" autocomplete="off">
              </div>
              <div class="field">
                <label for="hotlineLabel">电话标签</label>
                <input class="control" id="hotlineLabel" data-field="hotlineLabel" maxlength="12" autocomplete="off">
              </div>
              <div class="field">
                <label for="hotline">电话号码（可留空）</label>
                <input class="control" id="hotline" data-field="hotline" maxlength="24" inputmode="tel" autocomplete="off">
              </div>
              <div class="field field-full">
                <label for="startName">起点站</label>
                <input class="control" id="startName" data-field="startName" maxlength="28" autocomplete="off">
              </div>
              <div class="field">
                <label for="startTime">起点首末班</label>
                <input class="control" id="startTime" data-field="startTime" maxlength="22" placeholder="04:30–20:30" autocomplete="off">
              </div>
              <div class="field">
                <label for="endTime">终点首末班</label>
                <input class="control" id="endTime" data-field="endTime" maxlength="22" placeholder="04:30–20:30" autocomplete="off">
              </div>
              <div class="field field-full">
                <label for="endName">终点站</label>
                <input class="control" id="endName" data-field="endName" maxlength="28" autocomplete="off">
              </div>
              <div class="field field-full">
                <label for="topNote">线路上方说明</label>
                <input class="control" id="topNote" data-field="topNote" maxlength="50" autocomplete="off">
              </div>
              <div class="field field-full">
                <label for="footerNote">右下角备注</label>
                <input class="control" id="footerNote" data-field="footerNote" maxlength="70" autocomplete="off">
              </div>
            </div>
          </div>
        </details>

        <details class="card form-card" open>
          <summary>
            <span>站点信息</span>
            <span class="summary-meta" id="stationCount">0 个站点</span>
          </summary>
          <div class="form-body">
            <div class="grid">
              <div class="field field-full">
                <span class="field-label">每行填写一个站名</span>
                <div class="station-help" aria-label="站点格式说明">
                  <span class="tag">不加标记：双向停靠</span>
                  <span class="tag tag-blue">[去]／［去］ 仅去程停靠</span>
                  <span class="tag tag-red">[返]／［返］ 仅返程停靠</span>
                </div>
                <textarea id="stationInput" spellcheck="false" aria-label="站点列表"></textarea>
                <p class="helper">可以直接粘贴带“1.”或“1、”的编号列表，编号会自动忽略。首行和末行会自动显示为起点、终点样式；最多显示 80 站。</p>
                <div class="row-actions">
                  <button class="btn btn-compact" id="syncEndpoints" type="button">同步首末站</button>
                  <button class="btn btn-compact" id="reverseRoute" type="button">反转线路</button>
                  <button class="btn btn-compact" id="restoreSample" type="button">恢复南堡示例</button>
                  <button class="btn btn-compact btn-danger" id="clearStations" type="button">清空站点</button>
                </div>
              </div>
            </div>
          </div>
        </details>

        <details class="card form-card">
          <summary>
            <span>样式与导出</span>
            <span class="summary-meta">颜色、背景、清晰度</span>
          </summary>
          <div class="form-body">
            <div class="grid">
              <div class="field">
                <label for="themeColor">线路主色</label>
                <div class="color-control">
                  <input id="themeColor" data-field="themeColor" type="color">
                  <input class="control" id="themeColorText" data-color-text="themeColor" maxlength="7" aria-label="线路主色代码">
                </div>
              </div>
              <div class="field">
                <label for="outboundColor">去程单向色</label>
                <div class="color-control">
                  <input id="outboundColor" data-field="outboundColor" type="color">
                  <input class="control" id="outboundColorText" data-color-text="outboundColor" maxlength="7" aria-label="去程单向色代码">
                </div>
              </div>
              <div class="field">
                <label for="inboundColor">返程单向色</label>
                <div class="color-control">
                  <input id="inboundColor" data-field="inboundColor" type="color">

    function loadState() {
      var fresh = cloneDefault();
      try {
        var saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) return fresh;
        var parsed = JSON.parse(saved) || {};
        if (!parsed.schemaVersion || parsed.schemaVersion < 2) {
          var oldCityOpacity = Number(parsed.cityOpacity);
          if (!Number.isFinite(oldCityOpacity)) oldCityOpacity = 12;
          parsed.cityOpacity = Math.max(0, Math.min(100, Math.round(oldCityOpacity / 12 * 100)));
          parsed.schemaVersion = 2;
        }
        return Object.assign(fresh, parsed);
      } catch (error) {
        return fresh;

    function escapeXml(value) {
      return String(value == null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&apos;");
    }

    function validColor(value, fallback) {
      var text = String(value || "").trim();
      return /^#[0-9a-f]{6}$/i.test(text) ? text.toLowerCase() : fallback;
    }

    function shadeColor(hex, amount) {
      var clean = validColor(hex, "#009a48").slice(1);
      var num = parseInt(clean, 16);
      var r = Math.max(0, Math.min(255, (num >> 16) + amount));
      var g = Math.max(0, Math.min(255, ((num >> 8) & 255) + amount));
      var b = Math.max(0, Math.min(255, (num & 255) + amount));
      return "#" + [r, g, b].map(function (part) {
        return part.toString(16).padStart(2, "0");
      }).join("");
    }

    function charCount(value) {
      return Array.from(String(value || "")).length;
    }

    function shorten(value, max) {
      var chars = Array.from(String(value || ""));
      if (chars.length <= max) return chars.join("");
      return chars.slice(0, Math.max(1, max - 1)).join("") + "…";
    }

    function parseStations(text) {
      return String(text || "")
        .split(/\r?\n/)
        .map(function (raw) {
          var line = raw.trim().replace(/^\s*\d+\s*[.、．:：\-]\s*/, "");
          if (!line) return null;
          var type = "both";
          var match = line.match(/^[\[［]\s*(去|上|去程|返|下|返程)\s*[\]］]\s*/);
          if (match) {
            type = /^(去|上|去程)$/.test(match[1]) ? "out" : "in";
            line = line.slice(match[0].length).trim();
          }
          return line ? { name: line, type: type } : null;
        })
        .filter(Boolean)
        .slice(0, 80);
    }

    function serializeStations(stops) {
      return stops.map(function (stop) {
        var tag = stop.type === "out" ? "[去]" : stop.type === "in" ? "[返]" : "";
        return tag + stop.name;
      }).join("\n");
    }

    function fitFont(text, maxWidth, base, minimum) {
      var count = Math.max(1, charCount(text));
      return Math.max(minimum, Math.min(base, maxWidth / count));
    }

    function buildSkyline(opacity) {
      if (opacity <= 0) return "";
      return '<image x="258" y="0" width="1278" height="429" preserveAspectRatio="none" opacity="' +
        Math.max(0, Math.min(1, opacity)).toFixed(3) + '" href="' + ORIGINAL_SKYLINE_DATA + '" xlink:href="' + ORIGINAL_SKYLINE_DATA + '"/>';
    }

    function buildSvg(data) {
      var theme = validColor(data.themeColor, "#009a48");
      var outColor = validColor(data.outboundColor, "#058eb5");
      var inColor = validColor(data.inboundColor, "#d92543");
      var darkTheme = shadeColor(theme, -24);
      var stops = parseStations(data.stations);
      var lineY = 68;
      var lineStart = 282;
      var lineEnd = 1494;
      var firstStopX = 290;
      var lastStopX = 1487;
      var count = Math.max(1, stops.length);
      var step = stops.length > 1 ? (lastStopX - firstStopX) / (stops.length - 1) : (lastStopX - firstStopX);
      var fontScale = Math.max(.8, Math.min(1.25, Number(data.fontScale || 100) / 100));
      var titleSize = fitFont(data.routeName, 220, 47, 24);
      var startNameSize = fitFont(data.startName, 125, 14, 9.5);
      var endNameSize = fitFont(data.endName, 125, 14, 9.5);
      var cityOpacity = data.showCity ? Math.max(0, Math.min(100, Number(data.cityOpacity || 0))) / 100 : 0;
      var p = [];

      p.push('<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="' + SVG_WIDTH + '" height="' + SVG_HEIGHT + '" viewBox="0 0 ' + SVG_WIDTH + ' ' + SVG_HEIGHT + '" role="img" aria-label="' + escapeXml(data.routeName || "公交线路图") + '">');
      p.push('<defs>');
      p.push('<linearGradient id="sideGradient" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="' + theme + '"/><stop offset="1" stop-color="' + darkTheme + '"/></linearGradient>');
      p.push('<linearGradient id="paperGradient" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eef5fb"/><stop offset=".34" stop-color="#ffffff"/><stop offset="1" stop-color="#fbfcfd"/></linearGradient>');
      p.push('</defs>');
      p.push('<rect width="1536" height="429" fill="#ffffff"/>');
      p.push('<rect x="258" width="1278" height="429" fill="url(#paperGradient)"/>');
      p.push(buildSkyline(cityOpacity));
      p.push('<rect width="258" height="429" fill="url(#sideGradient)"/>');
      p.push('<rect x="257" width="2" height="429" fill="#ffffff" opacity=".8"/>');

      p.push('<rect x="' + lineStart + '" y="' + (lineY - 10) + '" width="' + (lineEnd - lineStart) + '" height="20" rx="10" fill="' + theme + '"/>');
      for (var arrowX = 385; arrowX < 1430; arrowX += 112) {
        p.push('<g transform="translate(' + arrowX + ' ' + lineY + ')" fill="#ffffff" opacity=".96">');
        p.push('<path d="M5 -1 H-8 L-3 -7 V-4 H5 Z"/>');
        p.push('<path d="M-2 1 H11 L6 7 V4 H-2 Z"/>');
        p.push('</g>');
      }
      p.push('<circle cx="290" cy="' + lineY + '" r="6.6" fill="#ffffff"/>');
      p.push('<circle cx="1487" cy="' + lineY + '" r="6.6" fill="' + inColor + '"/>');

      if (stops.length) {
        stops.forEach(function (stop, index) {
          var x = stops.length === 1 ? firstStopX : firstStopX + index * step;
          var color = stop.type === "out" ? outColor : stop.type === "in" ? inColor : "#172019";
          var isStart = index === 0;
          var isEnd = index === stops.length - 1;
          if (isStart) color = darkTheme;
          if (isEnd) color = inColor;
          var baseSize = Math.max(11, Math.min(20, step * .78)) * fontScale;
          var length = Math.max(1, charCount(stop.name));
          var size = Math.max(9.5, Math.min(baseSize, 252 / length));
          var weight = (isStart || isEnd || stop.type !== "both") ? 700 : 500;
          p.push('<text x="' + x.toFixed(2) + '" y="88" font-family="' + FONT_FAMILY + '" font-size="' + size.toFixed(2) + '" font-weight="' + weight + '" fill="' + color + '" writing-mode="vertical-rl" text-orientation="upright" style="paint-order:stroke;stroke:#ffffff;stroke-width:2.3px;stroke-opacity:.95;stroke-linejoin:round">' + escapeXml(stop.name) + '</text>');
        });
      } else {
        p.push('<text x="890" y="220" font-family="' + FONT_FAMILY + '" font-size="28" fill="#8a9890" text-anchor="middle">请在编辑区填写站点</text>');
      }

      p.push('<text x="282" y="39" font-family="' + FONT_FAMILY + '" font-size="13" font-weight="600" fill="#4c6559">' + escapeXml(shorten(data.startName, 21)) + ' → ' + escapeXml(shorten(data.endName, 21)) + '</text>');
      p.push('<text x="1492" y="39" font-family="' + FONT_FAMILY + '" font-size="12" fill="#708078" text-anchor="end">' + escapeXml(data.topNote) + '</text>');

      p.push('<text x="20" y="98" font-family="' + FONT_FAMILY + '" font-size="' + titleSize.toFixed(1) + '" font-weight="700" fill="#ffffff">' + escapeXml(data.routeName) + '</text>');
      p.push('<path d="M0 158 H113 L125 145 L137 158 H258" fill="none" stroke="#ffffff" stroke-width="1.2" stroke-opacity=".82"/>');
      p.push('<text x="24" y="237" font-family="' + FONT_FAMILY + '" font-size="24" font-weight="700" fill="#ffffff">' + escapeXml(data.operator) + '</text>');
      if (String(data.hotline || "").trim()) {
        p.push('<text x="24" y="282" font-family="' + FONT_FAMILY + '" font-size="13" fill="#ffffff" opacity=".92">' + escapeXml(data.hotlineLabel) + '：' + escapeXml(data.hotline) + '</text>');
      }
      p.push('<text x="24" y="320" font-family="' + FONT_FAMILY + '" font-size="13" fill="#ffffff" opacity=".76">' + escapeXml(data.timeTitle) + '</text>');
      p.push('<text x="24" y="353" font-family="' + FONT_FAMILY + '" font-size="' + startNameSize.toFixed(1) + '" fill="#ffffff">' + escapeXml(data.startName) + '</text>');
      p.push('<text x="238" y="353" font-family="' + FONT_FAMILY + '" font-size="13.5" fill="#ffffff" text-anchor="end">' + escapeXml(data.startTime) + '</text>');
      p.push('<text x="24" y="385" font-family="' + FONT_FAMILY + '" font-size="' + endNameSize.toFixed(1) + '" fill="#ffffff">' + escapeXml(data.endName) + '</text>');
      p.push('<text x="238" y="385" font-family="' + FONT_FAMILY + '" font-size="13.5" fill="#ffffff" text-anchor="end">' + escapeXml(data.endTime) + '</text>');

      if (data.showLegend) {
        p.push('<circle cx="380" cy="405" r="4" fill="' + outColor + '"/><text x="389" y="409" font-family="' + FONT_FAMILY + '" font-size="10.5" fill="' + outColor + '">去程单向</text>');
        p.push('<circle cx="460" cy="405" r="4" fill="' + inColor + '"/><text x="469" y="409" font-family="' + FONT_FAMILY + '" font-size="10.5" fill="' + inColor + '">返程单向</text>');
      }
      if (data.showFooter) {
        p.push('<text x="1418" y="409" font-family="' + FONT_FAMILY + '" font-size="9.5" fill="#7b8a82" text-anchor="end">' + escapeXml(data.footerNote) + '</text>');
      }
      p.push('<path d="M288 407 H328 V393 L352 421 H288 Z" fill="' + inColor + '"/>');
      p.push('<path d="M1498 407 H1458 V393 L1434 421 H1498 Z" fill="' + outColor + '"/>');
      p.push('</svg>');
      return p.join("");
    }

    // DOM INIT
    var state = loadState();
    var previewMount = document.getElementById("previewMount");
    var previewScroll = document.getElementById("previewScroll");
    var fullPreview = document.getElementById("fullPreview");
    var fullPreviewDialog = document.getElementById("fullPreviewDialog");
    var exportDialog = document.getElementById("exportDialog");
    var stationInput = document.getElementById("stationInput");
    var stationCount = document.getElementById("stationCount");
    var saveState = document.getElementById("saveState");
    var toastNode = document.getElementById("toast");
    var exportImage = document.getElementById("exportImage");
    var exportStatus = document.getElementById("exportStatus");
    var saveImageLink = document.getElementById("saveImageLink");
    var shareImage = document.getElementById("shareImage");
    var mobileSaveHint = document.getElementById("mobileSaveHint");
    var saveTimer = 0;
    var toastTimer = 0;
    var renderQueued = false;
    var exportObjectUrl = "";
    var lastExportBlob = null;

    function setControlsFromState() {
      document.querySelectorAll("[data-field]").forEach(function (control) {
        var key = control.getAttribute("data-field");
        if (!(key in state)) return;
        if (control.type === "checkbox") {
          control.checked = Boolean(state[key]);
        } else {
          control.value = state[key];
        }
      });
      stationInput.value = state.stations || "";
      document.querySelectorAll("[data-color-text]").forEach(function (control) {
        control.value = state[control.getAttribute("data-color-text")] || "";
      });
      updateRangeLabels();
    }

    function updateRangeLabels() {
      document.getElementById("cityOpacityValue").textContent = String(state.cityOpacity) + "%";
      document.getElementById("fontScaleValue").textContent = String(state.fontScale) + "%";
    }

    function scheduleSave() {
      saveState.textContent = "正在保存…";
      clearTimeout(saveTimer);
      saveTimer = window.setTimeout(function () {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
          saveState.textContent = "已自动保存";
        } catch (error) {
          saveState.textContent = "当前浏览器未允许保存";
        }
      }, 260);
    }

    function render() {
      if (renderQueued) return;
      renderQueued = true;
      window.requestAnimationFrame(function () {
        var svg = buildSvg(state);
        previewMount.innerHTML = svg;
        if (fullPreviewDialog.open) fullPreview.innerHTML = svg;
        var count = parseStations(state.stations).length;
        stationCount.textContent = count + " 个站点";
        updateRangeLabels();
        renderQueued = false;
      });
      scheduleSave();
    }

    function showToast(message) {
      toastNode.textContent = message;
      toastNode.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = window.setTimeout(function () {
        toastNode.classList.remove("show");
      }, 2100);
    }

    function openLargePreview() {
      fullPreview.innerHTML = buildSvg(state);
      if (typeof fullPreviewDialog.showModal === "function") {
        fullPreviewDialog.showModal();
      } else {
        showToast("当前浏览器不支持弹窗预览，请使用“放大查看”");
      }
    }

    function safeFilename(name) {
      var clean = String(name || "公交线路图")
        .replace(/[\\/:*?"<>|]/g, "_")
        .replace(/\s+/g, "")
        .slice(0, 40);
      return (clean || "公交线路图") + ".png";
    }

    function resetExportDialog() {
      exportImage.hidden = true;
      exportImage.removeAttribute("src");
      saveImageLink.hidden = true;
      shareImage.hidden = true;
      mobileSaveHint.hidden = true;
      exportStatus.textContent = "正在生成，请稍候…";
    }

    function finishExport(blob, pixelWidth, pixelHeight) {
      lastExportBlob = blob;
      if (exportObjectUrl) URL.revokeObjectURL(exportObjectUrl);
      exportObjectUrl = URL.createObjectURL(blob);
      exportImage.src = exportObjectUrl;
      exportImage.hidden = false;
      saveImageLink.href = exportObjectUrl;
      saveImageLink.download = safeFilename(state.routeName);
      saveImageLink.hidden = false;
      exportStatus.textContent = "已生成 " + pixelWidth + " × " + pixelHeight + " PNG。";
      mobileSaveHint.hidden = false;

      try {
        var shareFile = new File([blob], safeFilename(state.routeName), { type: "image/png" });
        if (navigator.canShare && navigator.canShare({ files: [shareFile] })) {
          shareImage.hidden = false;
        }
      } catch (error) {
        shareImage.hidden = true;
      }

      window.setTimeout(function () {
        try {
          saveImageLink.click();
        } catch (error) {
          showToast("图片已生成，请点击“保存 PNG”");
        }
      }, 80);
    }

    function exportPng() {
      if (!String(state.routeName || "").trim()) {
        showToast("请先填写线路名称");
        document.getElementById("routeName").focus();
        return;
      }
      if (parseStations(state.stations).length < 2) {
        showToast("至少需要填写两个站点");
        stationInput.focus();
        return;
      }

      resetExportDialog();
      if (typeof exportDialog.showModal === "function") exportDialog.showModal();

      var scale = Math.max(1, Math.min(3, Number(state.exportScale || 2)));
      var pixelWidth = SVG_WIDTH * scale;
      var pixelHeight = SVG_HEIGHT * scale;
      var svgBlob = new Blob([buildSvg(state)], { type: "image/svg+xml;charset=utf-8" });
      var svgUrl = URL.createObjectURL(svgBlob);
      var image = new Image();

      image.onload = function () {
        URL.revokeObjectURL(svgUrl);
        try {
          var canvas = document.createElement("canvas");
          canvas.width = pixelWidth;
          canvas.height = pixelHeight;
          var context = canvas.getContext("2d");
          context.fillStyle = "#ffffff";
          context.fillRect(0, 0, pixelWidth, pixelHeight);
          context.imageSmoothingEnabled = true;
          context.imageSmoothingQuality = "high";
          context.drawImage(image, 0, 0, pixelWidth, pixelHeight);
          canvas.toBlob(function (blob) {
            if (!blob) {
              exportStatus.textContent = "生成失败，请把清晰度调低后重试。";
              return;
            }
            finishExport(blob, pixelWidth, pixelHeight);
          }, "image/png");
        } catch (error) {
          exportStatus.textContent = "生成失败，请把清晰度调低后重试。";
        }
      };

      image.onerror = function () {
        URL.revokeObjectURL(svgUrl);
        exportStatus.textContent = "当前浏览器无法生成图片，建议使用最新版 Chrome 或 Safari。";
      };
      image.src = svgUrl;
    }

    document.querySelectorAll("[data-field]").forEach(function (control) {
      control.addEventListener("input", function () {
        var key = control.getAttribute("data-field");
        if (control.type === "checkbox") {
          state[key] = control.checked;
        } else if (control.type === "range") {
          state[key] = Number(control.value);
        } else {
          state[key] = control.value;
        }
        if (control.type === "color") {
          var colorText = document.querySelector('[data-color-text="' + key + '"]');
          if (colorText) colorText.value = control.value;
        }
        render();
      });
    });

    document.querySelectorAll("[data-color-text]").forEach(function (control) {
      control.addEventListener("change", function () {
        var key = control.getAttribute("data-color-text");
        var normalized = validColor(control.value, state[key]);
        state[key] = normalized;
        control.value = normalized;
        var picker = document.querySelector('[data-field="' + key + '"]');
        if (picker) picker.value = normalized;
        render();
      });
    });

    stationInput.addEventListener("input", function () {
      state.stations = stationInput.value;
      render();
    });

    document.getElementById("zoomToggle").addEventListener("click", function (event) {
      var zoomed = previewScroll.classList.toggle("zoomed");
      event.currentTarget.textContent = zoomed ? "适应屏幕" : "放大查看";
      if (!zoomed) previewScroll.scrollLeft = 0;
    });

    document.getElementById("openFullPreview").addEventListener("click", openLargePreview);
    document.getElementById("mobileFullPreview").addEventListener("click", openLargePreview);

    document.querySelectorAll(".export-trigger").forEach(function (button) {
      button.addEventListener("click", exportPng);
    });

    document.querySelectorAll(".dialog-close").forEach(function (button) {
      button.addEventListener("click", function () {
        var dialog = button.closest("dialog");
        if (dialog) dialog.close();
      });
    });

    [fullPreviewDialog, exportDialog].forEach(function (dialog) {
      dialog.addEventListener("click", function (event) {
        if (event.target === dialog) dialog.close();
      });
    });

    function restoreSampleData() {
      if (!window.confirm("恢复南堡专线示例？当前填写内容会被覆盖。")) return;
      state = cloneDefault();
      setControlsFromState();
      render();
      showToast("已恢复南堡专线示例");
    }

    document.getElementById("restoreSample").addEventListener("click", restoreSampleData);
    document.getElementById("restoreSampleTop").addEventListener("click", restoreSampleData);

    document.getElementById("clearStations").addEventListener("click", function () {
      if (!window.confirm("确定清空全部站点吗？")) return;
      state.stations = "";
      stationInput.value = "";
      render();
    });

    document.getElementById("syncEndpoints").addEventListener("click", function () {
      var stops = parseStations(state.stations);
      var start = String(state.startName || "").trim();
      var end = String(state.endName || "").trim();
      if (!start || !end) {
        showToast("请先填写起点站和终点站");
        return;
      }
      if (!stops.length) {
        stops = [{ name: start, type: "both" }, { name: end, type: "both" }];
      } else if (stops.length === 1) {
        stops[0].name = start;
        stops.push({ name: end, type: "both" });
      } else {
        stops[0].name = start;
        stops[stops.length - 1].name = end;
      }
      state.stations = serializeStations(stops);
      stationInput.value = state.stations;
      render();
      showToast("已同步首末站");
    });

    document.getElementById("reverseRoute").addEventListener("click", function () {
      var stops = parseStations(state.stations).reverse().map(function (stop) {
        return {
          name: stop.name,
          type: stop.type === "out" ? "in" : stop.type === "in" ? "out" : "both"
        };
      });
      var oldStartName = state.startName;
      var oldStartTime = state.startTime;
      state.startName = state.endName;
      state.startTime = state.endTime;
      state.endName = oldStartName;
      state.endTime = oldStartTime;
      state.stations = serializeStations(stops);
      setControlsFromState();
      render();
      showToast("已反转线路方向");
    });

    document.getElementById("blankAll").addEventListener("click", function () {
      if (!window.confirm("新建空白线路？当前所有设置会被覆盖。")) return;
      state = Object.assign(cloneDefault(), {
        routeName: "",
        operator: "",
        hotline: "",
        startName: "",
        startTime: "",
        endName: "",
        endTime: "",
        topNote: "",
        footerNote: "",
        stations: ""
      });
      setControlsFromState();
      render();
      showToast("已新建空白线路");
    });

    shareImage.addEventListener("click", function () {
      if (!lastExportBlob) return;
      try {
        var file = new File([lastExportBlob], safeFilename(state.routeName), { type: "image/png" });
        navigator.share({
          title: state.routeName || "公交线路图",
          files: [file]
        }).catch(function () {});
      } catch (error) {
        showToast("当前浏览器不支持直接分享文件");
      }
    });

    setControlsFromState();
    previewMount.innerHTML = buildSvg(state);
    stationCount.textContent = parseStations(state.stations).length + " 个站点";
  </script>
</body>
</html>
